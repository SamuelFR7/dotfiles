[colors]
background = #1E1E2E
background-alt = #1E1E2E
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
white = #EAEAEA
grey = #61616C
green = #25D865
blue = #168ECA
mauve = #490761
[bar/main]

width = 100%
height = 40pt
radius = 10
cursor-click = pointer
background = ${colors.background}
foreground = ${colors.foreground}

font-0 = "JetBrainsMono Nerd Font:weight=bold:size=12"
font-1 = "Symbols Nerd Font Mono:size=14"

line-size = 4pt

border-size = 3pt
border-color = #0000000

padding-left = 2
padding-right = 2

module-margin = 0

modules-left = arch space date space space spo space spotify
modules-center = xworkspaces
modules-right = space space space space space mic space pulseaudio
[module/xworkspaces]
type = internal/xworkspaces

label-active = ÔÉą
label-active-padding = 1
label-active-foreground = ${colors.disabled}
label-active-font = 1

label-occupied = ÔāĖ
label-occupied-padding = 1
label-occupied-font = 1

label-empty = ÔāĖ
label-empty-background = ${colors.mauve}
label-empty-padding = 1
label-empty-font = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%





[network-base]
type = internal/network
interval = 5
format-connected = <laprimarybel-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/spotify]
type = custom/script
exec = ~/.config/scripts/media.sh
interval = 1
format = <label>
label = %output%


[settings]
screenchange-reload = true
pseudo-transparency = true

[module/mic]
type = custom/script
exec = ~/.config/scripts/mic.sh
interval = 1  # Update interval in seconds
format-foreground = ${colors.new1}
format = <label>
label = %output%
enable-scroll = true
click-left = ~/scripts/mic.sh 1




[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-foreground = ${colors.new1}
format-volume-prefix-foreground = ${colors.new1}
format-volume = <label-volume>
label-volume = %percentage%%

label-muted = ůįĖĀ %percentage%%
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p|%d-%m
label = %date%
label-foreground = ${colors.white}


[module/spo]
type = custom/text
content = ÔÜľ
content-foreground = ${colors.green}
content-margin = 0


[module/arch]
type = custom/text
content = ůį£á
content-foreground = ${colors.blue}
content-margin = 0

[module/space]
type = custom/text
content = " "

[module/separator]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}

[module/cava]
type = custom/script
exec = ~/.config/scripts/cava.py -f 60 -b 16 -e 490761,78109e,9937bd  -c stereo
tail = true
